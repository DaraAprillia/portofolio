<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
    <link rel="stylesheet" type="text/css" href="kalkulatorbiasa.css">
</head>
<body>
    <header>
        <nav>
            <h1 class="nama">DARA</h1>
            <nav class="navbar">
            <ul>
               <li><a href="index.html">HOME</a></li>
               <li><a href="about.html">ABOUT</a></li>
               <li><a href="portofolio.html">PORTOFOLIO</a></li>
               <li> <a href="Work.html">WORK</a></li>
               <li><a href="contact.html">CONTACT</a></li>
           </ul>
            </nav>
        </nav>
    </header>

    <div class="calculator">
        <div class="content">
            <input type="text" placeholder="0" id="inputBox">
            <div>
                <button class="other-clr">AC</button>
                <button class="other-clr">DE</button>
                <button class="main">%</button>
                <button class="main">/</button>
            </div>

            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="main">*</button>
            </div>

            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="main">-</button>
            </div>

            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="main">+</button>
            </div>

            <div>
                <button>0</button>
                <button>.</button>
                <button class="equal">=</button>
            </div>
            
        </div>
    </div>
    <script src="kalkulatorbiasa.js"></script>

    <footer class="footer">
        <p> dara's portofolio &copy; 2024, Indonesia</p>
    </footer>
</body>
</html>
